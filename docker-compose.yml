services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8091:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    expose:
      - "8000"
    volumes:
      # Persistente Daten (gespeicherter Graph, Benutzer)
      - bi-data:/app/data
    env_file:
      - path: .env
        required: false     # optional – läuft auch ohne .env
    environment:
      SAVE_FILE:    /app/data/saved_graph.json
      USERS_FILE:   /app/data/users.json
      AUTH_ENABLED: "false"   # auf "true" setzen + SECRET_KEY in .env für Auth
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s

volumes:
  bi-data:
