name: CI – Tests & Coverage

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "requirements-dev.txt"
      - "vitest.config.js"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "Dockerfile.backend"
      - ".dockerignore"
      - "docker/**"
      - "docker-compose.yml"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main, develop]

jobs:

  # ── Backend: pytest ───────────────────────────────────────────────────────
  backend:
    name: Backend (pytest – Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Abhängigkeiten installieren
        run: pip install -r requirements-dev.txt

      - name: Backend-Tests (Coverage ≥ 70 %)
        env:
          AUTH_ENABLED: "false"
          SAVE_FILE:    "/tmp/bi_test/graph.json"
          USERS_FILE:   "/tmp/bi_test/users.json"
        run: |
          pytest \
            --cov \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            -v

      - name: Coverage-Artefakt hochladen (nur 3.13)
        if: matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: coverage.xml
          retention-days: 14

  # ── Frontend: Vitest ──────────────────────────────────────────────────────
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 24 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: npm-Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package.json') }}
          restore-keys: npm-

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Frontend-Tests (Vitest + Coverage)
        run: npm run test:coverage

      - name: Coverage-Artefakt hochladen
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: coverage/
          retention-days: 14

  # ── Docker: Build-Test ────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Frontend-Image bauen
        run: docker build -t ui4bi-frontend:ci -f Dockerfile .

      - name: Backend-Image bauen
        run: docker build -t ui4bi-backend:ci -f Dockerfile.backend .

      - name: Stack hochfahren und Healthcheck
        run: |
          docker compose up -d
          sleep 10
          curl -sf http://localhost:8091/index.html || exit 1
          docker compose down
