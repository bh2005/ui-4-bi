<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BI‑Editor POC (Vanilla JS)</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="toolbar">
  <button id="btn-new-node" title="Neue Knoten (N)">New Node (N)</button>
  <button id="btn-new-edge" title="Neue Kante (E)">New Edge (E)</button>
  <button id="btn-delete" title="Löschen (Del)">Delete</button>
  <button id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
  <button id="btn-redo" title="Redo (Ctrl+Y)">Redo</button>
  <button id="btn-save" title="Save (S)">Save</button>
  <button id="btn-import">Import</button>
  <button id="btn-export">Export</button>
  <span class="status" id="status">Ready</span>
</header>

<main class="main">
  <aside class="sidebar">
    <h3>Rule</h3>
    <input id="rule-title" placeholder="Rule title" />
    <textarea id="rule-desc" placeholder="Description"></textarea>
    <hr/>
    <h4>Inspector</h4>
    <div id="inspector-empty">Select a node or edge</div>
    <div id="inspector" class="hidden">
      <label>Label<input id="prop-label" /></label>
      <label>Selector<input id="prop-selector" /></label>
      <label>States<input id="prop-states" placeholder="CRITICAL,OK"/></label>
      <label>Color<input id="prop-color" type="color" /></label>
      <div class="inspector-actions">
        <button id="prop-apply">Apply</button>
        <button id="prop-cancel">Cancel</button>
      </div>
    </div>
  </aside>

  <section class="canvas-wrap">
    <svg id="canvas" tabindex="0"></svg>
  </section>
</main>

<input type="file" id="file-input" class="hidden" />

<footer class="footer">
  <small>POC — Vanilla JS SVG BI Editor</small>
</footer>

<script src="mock-backend.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
