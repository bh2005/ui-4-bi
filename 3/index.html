<!DOCTYPE html>
<html lang="de" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UI4BI – Visual BI Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    #canvas {
      background-image:
        linear-gradient(#33333322 1px, transparent 1px),
        linear-gradient(90deg, #33333322 1px, transparent 1px);
      background-size: 20px 20px;
      background-color: #1a1a1a;
    }
    #marquee {
      position: absolute;
      border: 2px dashed #13d38e;
      background: rgba(19,211,142,0.08);
      pointer-events: none;
      z-index: 1000;
    }
    #snapline-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: visible;
      z-index: 999;
    }
    .wp-handle {
      cursor: grab;
      pointer-events: all;
    }
    .wp-handle:active {
      cursor: grabbing;
    }
    #btn-snap.snap-active {
      background: #13d38e;
      color: #000;
      border-color: #13d38e;
    }
    #preview-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    #preview-modal.open {
      display: flex;
    }
    .state-OK       { background: #16a34a; color: #fff; }
    .state-WARNING  { background: #ca8a04; color: #fff; }
    .state-CRITICAL { background: #dc2626; color: #fff; }
    .state-UNKNOWN  { background: #6b7280; color: #fff; }
  </style>
</head>
<body class="bg-[#1a1a1a] text-gray-100 h-screen flex flex-col overflow-hidden font-sans">

  <!-- Toolbar -->
  <header class="bg-[#1e1e1e] border-b border-[#3a3a3a] h-12 flex items-center px-4 relative z-10">
    <div class="flex items-center gap-3">
      <svg width="140" height="36" viewBox="0 0 160 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g id="icon-aggregator">...</g>
        <g id="text-ui4bi">...</g>
        <text x="45" y="38" font-family="sans-serif" font-size="9" fill="#666666" font-style="italic">Visual Aggregator</text>
      </svg>
      <span class="text-lg font-bold text-white">UI4BI</span>
    </div>

    <div class="ml-auto flex items-center gap-2">

      <!-- Undo / Redo -->
      <button id="btn-undo" disabled title="Rückgängig (Ctrl+Z)"
        class="bg-[#2b2b2b] border border-[#444444] rounded w-9 h-9 flex items-center justify-center hover:bg-[#3a3a3a] disabled:opacity-30 disabled:cursor-not-allowed">
        <i data-lucide="undo-2" class="w-4 h-4"></i>
      </button>
      <button id="btn-redo" disabled title="Wiederholen (Ctrl+Y)"
        class="bg-[#2b2b2b] border border-[#444444] rounded w-9 h-9 flex items-center justify-center hover:bg-[#3a3a3a] disabled:opacity-30 disabled:cursor-not-allowed">
        <i data-lucide="redo-2" class="w-4 h-4"></i>
      </button>

      <div class="w-px h-6 bg-[#444444]"></div>

      <!-- Save / Validate -->
      <button id="btn-save" title="Speichern (Ctrl+S)"
        class="bg-[#13d38e] hover:bg-[#0fa678] text-black text-xs font-semibold px-3 py-1.5 rounded transition">
        Speichern
      </button>
      <button id="btn-validate" title="Graph validieren"
        class="bg-[#2b2b2b] border border-[#444444] hover:bg-[#3a3a3a] text-xs font-semibold px-3 py-1.5 rounded transition">
        Validieren
      </button>

      <div class="w-px h-6 bg-[#444444]"></div>

      <!-- Import / Export -->
      <button id="btn-import" title="JSON importieren"
        class="bg-[#2b2b2b] border border-[#444444] rounded w-9 h-9 flex items-center justify-center hover:bg-[#3a3a3a]">
        <i data-lucide="upload" class="w-4 h-4"></i>
      </button>
      <button id="btn-export" title="JSON exportieren"
        class="bg-[#2b2b2b] border border-[#444444] rounded w-9 h-9 flex items-center justify-center hover:bg-[#3a3a3a]">
        <i data-lucide="download" class="w-4 h-4"></i>
      </button>

      <div class="w-px h-6 bg-[#444444]"></div>

      <!-- Grid Snap Toggle -->
      <button id="btn-snap" title="Grid Snap ein/aus"
        class="snap-active bg-[#2b2b2b] border border-[#444444] rounded w-9 h-9 flex items-center justify-center hover:bg-[#3a3a3a] transition">
        <i data-lucide="grid" class="w-4 h-4"></i>
      </button>

      <!-- Preview -->
      <button id="btn-preview" title="Vorschau / Preview"
        class="bg-[#2b2b2b] border border-[#444444] hover:bg-[#3a3a3a] text-xs font-semibold px-3 py-1.5 rounded transition">
        Preview
      </button>

      <div class="w-px h-6 bg-[#444444]"></div>

      <!-- Zoom -->
      <div class="bg-[#2b2b2b] border border-[#444444] rounded px-3 py-1 text-sm flex items-center gap-2">
        <button id="zoom-out" class="hover:text-green-400">−</button>
        <span id="zoom-level" class="w-12 text-center">100%</span>
        <button id="zoom-in"  class="hover:text-green-400">+</button>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Linke Sidebar -->
    <aside class="w-72 bg-[#242424] border-r border-[#3a3a3a] flex flex-col">
      <div class="p-3 border-b border-[#3a3a3a]">
        <h3 class="text-white text-xs font-bold uppercase tracking-wide">Palette / Legend</h3>
      </div>
      <div class="p-4 space-y-3 flex-1 overflow-y-auto">
        <div draggable="true" data-type="aggregator" class="bg-[#2b2b2b] border-2 border-[#13d38e] rounded-md p-3 text-center text-sm cursor-grab hover:bg-[#333333]">
          BI Aggregator
        </div>
        <div draggable="true" data-type="host" class="bg-[#2b2b2b] border-2 border-[#A5D6A7] rounded p-3 text-center text-sm cursor-grab hover:bg-[#333333]">
          Host (Process)
        </div>
        <div draggable="true" data-type="service" class="bg-[#2b2b2b] border-2 border-[#90A4AE] rounded-md p-3 text-center text-sm cursor-grab hover:bg-[#333333] italic">
          Service
        </div>
      </div>

      <div class="p-3 border-t border-[#3a3a3a]">
        <h3 class="text-white text-xs font-bold uppercase tracking-wide mb-2">BI Collections / Tree</h3>
        <ul class="text-sm space-y-1">
          <li class="flex items-center gap-2 text-gray-300"><i data-lucide="folder" class="w-4 h-4"></i> Business Processes</li>
          <li class="flex items-center gap-2 ml-5 text-[#13d38e] font-medium"><i data-lucide="file-text" class="w-4 h-4"></i> Payment Platform</li>
          <li class="flex items-center gap-2 text-gray-300"><i data-lucide="folder" class="w-4 h-4"></i> Infrastructure</li>
        </ul>
      </div>
    </aside>

    <!-- Canvas wrapper (for marquee + snaplines) -->
    <main class="flex-1 relative overflow-hidden" id="canvas-wrapper">
      <div id="canvas" class="absolute inset-0 origin-top-left transition-transform duration-100"></div>
      <div id="marquee" class="hidden"></div>
      <svg id="snapline-layer"></svg>
    </main>

    <!-- Rechte Sidebar -->
    <aside class="w-80 bg-[#242424] border-l border-[#3a3a3a] flex flex-col">
      <div class="p-3 border-b border-[#3a3a3a]">
        <h3 class="text-white text-xs font-bold uppercase tracking-wide">Search</h3>
      </div>
      <div class="p-4">
        <div class="relative">
          <input type="text" placeholder="🔎 host, service..." class="w-full bg-[#1a1a1a] border border-[#444444] rounded px-3 py-2 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:border-[#13d38e]">
        </div>
      </div>

      <div class="p-3 border-t border-[#3a3a3a]">
        <h3 class="text-white text-xs font-bold uppercase tracking-wide">Properties</h3>
      </div>
      <div id="inspector" class="p-4 text-sm hidden">
        <!-- Dynamisch gefüllt -->
      </div>
      <div id="no-selection" class="p-4 text-gray-500 text-sm">
        Kein Element ausgewählt
      </div>
    </aside>
  </div>

  <!-- Preview Modal -->
  <div id="preview-modal">
    <div class="bg-[#1e1e1e] border border-[#3a3a3a] rounded-xl shadow-2xl w-[700px] max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between p-4 border-b border-[#3a3a3a]">
        <h2 class="text-white font-bold text-base">BI Preview – Node States</h2>
        <button id="preview-close" class="text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center rounded hover:bg-[#333]">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div id="preview-body" class="p-4 overflow-y-auto flex-1 text-sm">
        <div class="text-gray-500">Lade Vorschau…</div>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
