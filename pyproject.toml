[tool.pytest.ini_options]
testpaths     = ["tests"]
pythonpath    = ["src"]
asyncio_mode  = "auto"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["src"]
omit   = [
    "src/__pycache__/*",
    "tests/*",
    "*/site-packages/*",
]

[tool.coverage.report]
fail_under   = 70
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]

[tool.ruff]
target-version = "py311"
line-length    = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501", "UP007"]
